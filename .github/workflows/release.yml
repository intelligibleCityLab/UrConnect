name: Release Builds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            qt-arch: win64_msvc2019_64
            artifact: UrConnect-windows-x64
          - name: macos-arm64
            os: macos-14
            artifact: UrConnect-macos-arm64
          - name: linux-x64
            os: ubuntu-24.04
            artifact: UrConnect-linux-x64

    steps:
      - uses: actions/checkout@v5

      - name: Install Qt
        if: runner.os == 'Windows'
        id: qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "5.15.2"
          arch: ${{ matrix.qt-arch }}

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install boost-msvc-14.3 -y
          $boost = Get-ChildItem C:\local -Directory -Filter "boost_*" | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $boost) { throw "Boost installation was not found under C:\local" }
          "BOOST_ROOT=$($boost.FullName -replace '\\','/')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install boost qt@5
          echo "$(brew --prefix qt@5)/bin" >> "$GITHUB_PATH"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libboost-all-dev libgl1-mesa-dev libglu1-mesa-dev qtbase5-dev qttools5-dev libqt5opengl5-dev

      - name: Configure
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            QT5_ROOT="${{ steps.qt.outputs.dir }}"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            QT5_ROOT="$(brew --prefix qt@5)"
            BOOST_ROOT="$(brew --prefix boost)"
          else
            QT5_ROOT=""
            BOOST_ROOT="/usr/include"
          fi
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DQT5_ROOT="${QT5_ROOT}" -DBOOST_ROOT="${BOOST_ROOT}"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Deploy Qt runtime on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force package | Out-Null
          Copy-Item build/bin/Release/* package -Recurse -Force
          windeployqt package/depthmapX.exe

      - name: Deploy Qt runtime on macOS
        if: runner.os == 'macOS'
        run: |
          mkdir -p package
          cp -R build/bin/depthmapX.app package/
          macdeployqt package/depthmapX.app -always-overwrite

      - name: Package Linux executable
        if: runner.os == 'Linux'
        run: |
          mkdir -p package
          cp -R build/bin/* package/

      - name: Add license and notices
        shell: bash
        run: |
          cp LICENSE package/
          cp THIRD_PARTY_NOTICES.md package/

      - name: Archive Windows package
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path package/* -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Archive Unix package
        if: runner.os != 'Windows'
        run: tar -czf "${{ matrix.artifact }}.tar.gz" -C package .

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.zip
            ${{ matrix.artifact }}.tar.gz
          if-no-files-found: ignore

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: true
          generate_release_notes: true
