name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            qt-arch: win64_msvc2019_64
            artifact: UrConnect-windows-x64
            package-suffix: windows-x64
            release-status: Primary Windows release
          - name: macos-arm64
            os: macos-14
            artifact: UrConnect-macos-arm64
            package-suffix: macos-arm64-experimental
            release-status: Experimental macOS build
          - name: linux-x64
            os: ubuntu-24.04
            artifact: UrConnect-linux-x64
            package-suffix: linux-x64-experimental
            release-status: Experimental Linux build

    steps:
      - uses: actions/checkout@v5

      - name: Install Qt
        if: runner.os == 'Windows'
        id: qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "5.15.2"
          arch: ${{ matrix.qt-arch }}

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install boost-msvc-14.3 -y
          $boost = Get-ChildItem C:\local -Directory -Filter "boost_*" | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $boost) { throw "Boost installation was not found under C:\local" }
          "BOOST_ROOT=$($boost.FullName -replace '\\','/')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install boost qt@5
          echo "$(brew --prefix qt@5)/bin" >> "$GITHUB_PATH"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        timeout-minutes: 20
        run: |
          sudo apt-get update
          sudo env DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            libboost-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libqt5opengl5-dev \
            qtbase5-dev

      - name: Configure
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            QT5_ROOT="${{ steps.qt.outputs.dir }}"
            CMAKE_EXTRA_ARGS=()
          elif [ "$RUNNER_OS" = "macOS" ]; then
            QT5_ROOT="$(brew --prefix qt@5)"
            BOOST_ROOT="$(brew --prefix boost)"
            CMAKE_EXTRA_ARGS=()
          else
            QT5_ROOT=""
            BOOST_ROOT="/usr/include"
            CMAKE_EXTRA_ARGS=(
              -DCMAKE_C_FLAGS_RELEASE="-O0 -g0 -DNDEBUG"
              -DCMAKE_CXX_FLAGS_RELEASE="-O0 -g0 -DNDEBUG"
            )
          fi
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DQT5_ROOT="${QT5_ROOT}" -DBOOST_ROOT="${BOOST_ROOT}" "${CMAKE_EXTRA_ARGS[@]}"

      - name: Build
        timeout-minutes: 90
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            cmake --build build --config Release --parallel 2
          else
            cmake --build build --config Release --parallel
          fi

      - name: Deploy Qt runtime on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force package | Out-Null
          Copy-Item build/bin/Release/* package -Recurse -Force
          windeployqt package/depthmapX.exe

      - name: Deploy Qt runtime on macOS
        if: runner.os == 'macOS'
        run: |
          mkdir -p package
          app_path=""
          for candidate in build/bin/depthmapX.app build/bin/Release/depthmapX.app; do
            if [ -d "$candidate" ]; then
              app_path="$candidate"
              break
            fi
          done
          if [ -z "$app_path" ]; then
            echo "depthmapX.app was not found under build/bin"
            find build/bin -maxdepth 3 -print || true
            exit 1
          fi
          cp -R "$app_path" package/
          macdeployqt package/depthmapX.app -always-overwrite

      - name: Package Linux executable
        if: runner.os == 'Linux'
        run: |
          mkdir -p package
          cp -R build/bin/* package/

      - name: Add license and notices
        shell: bash
        run: |
          cp LICENSE package/
          cp THIRD_PARTY_NOTICES.md package/
          cat > package/README.txt <<EOF
          UrConnect ${GITHUB_REF_NAME:-manual}
          Platform: ${{ matrix.name }}
          Status: ${{ matrix.release-status }}

          Windows is the primary release target. macOS and Linux packages are experimental while packaging and UI validation continue.
          EOF

      - name: Archive Windows package
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = "${env:GITHUB_REF_NAME}"
          if ([string]::IsNullOrWhiteSpace($tag)) { $tag = "manual" }
          Compress-Archive -Path package/* -DestinationPath "UrConnect-$tag-${{ matrix.package-suffix }}.zip"

      - name: Archive Unix package
        if: runner.os != 'Windows'
        run: tar -czf "UrConnect-${GITHUB_REF_NAME:-manual}-${{ matrix.package-suffix }}.tar.gz" -C package .

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            UrConnect-*.zip
            UrConnect-*.tar.gz
          if-no-files-found: ignore

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: artifacts
      - name: Write release notes
        run: |
          cat > release-notes.md <<EOF
          UrConnect ${GITHUB_REF_NAME}

          Windows x64 is the primary release artifact for this version.

          Experimental artifacts:
          - macOS arm64
          - Linux x64

          The macOS and Linux builds use the same shared C++ analysis code as Windows, but remain marked experimental while packaging and UI validation continue.
          EOF
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: UrConnect ${{ github.ref_name }}
          body_path: release-notes.md
          files: artifacts/**/*
          draft: false
          prerelease: false
