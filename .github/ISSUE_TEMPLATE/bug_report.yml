name: Bug report
description: Report a reproducible UrConnect problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please do not upload private or restricted GIS datasets.
  - type: input
    id: version
    attributes:
      label: UrConnect version or commit
      description: Paste the release version or commit hash.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, compiler, CMake, Qt, and Boost versions.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reproducible workflow.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
